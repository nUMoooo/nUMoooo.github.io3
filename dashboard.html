<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #e9ecef; margin: 0; padding: 20px; }
        .container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0px 0px 10px #ccc; max-width: 600px; margin: auto; }
        h1 { color: #333; }
        .logout-btn { background-color: #dc3545; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; }
        .logout-btn:hover { background-color: #c82333; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Selamat Datang di Z.C0RNER Admin Dashboard!</h1>
        <p>Halo, <span id="nama-pengguna"></span>. Anda berhasil masuk ke dalam sistem.</p>
        
        <p>Ini adalah halaman utama. Hanya pengguna yang sudah login yang bisa melihat halaman ini.</p>

        <button class="logout-btn" onclick="prosesLogout()">Keluar (Logout)</button>
    </div>

    <script>
        
        var status = sessionStorage.getItem("statusLogin");
        
        
        if (status !== "berhasil") {
            alert("Anda belum login! Silakan login terlebih dahulu.");
            window.location.href = "index.html";
        }

        
        var nama = sessionStorage.getItem("namaUser");
        document.getElementById("nama-pengguna").innerText = nama;

        function prosesLogout() {
            
            sessionStorage.removeItem("statusLogin");
            sessionStorage.removeItem("namaUser");
            
            
            window.location.href = "index.html";
        }
    </script>

</body>
</html>
