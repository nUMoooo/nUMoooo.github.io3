<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Halaman Login</title>
    <style>
       
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; text-align: center; padding-top: 100px; }
        .login-box { background: white; padding: 20px; border-radius: 8px; width: 300px; margin: auto; box-shadow: 0px 0px 10px #ccc; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 100%; padding: 10px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #218838; }
        #pesan-error { color: red; font-size: 14px; display: none; }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>Login Sistem</h2>
        <input type="text" id="username" placeholder="Masukkan Username">
        <input type="password" id="password" placeholder="Masukkan Password">
        <p id="pesan-error">Username atau Password salah!</p>
        <button onclick="prosesLogin()">Masuk</button>
    </div>

    <script>
        function prosesLogin() {
            
            var user = document.getElementById("username").value;
            var pass = document.getElementById("password").value;

            
            if (user === "admin" && pass === "12345") {
                
                sessionStorage.setItem("statusLogin", "berhasil");
                sessionStorage.setItem("namaUser", user);
                
                
                window.location.href = "dashboard.html";
            } else {
                
                document.getElementById("pesan-error").style.display = "block";
            }
        }
    </script>

</body>
</html>
